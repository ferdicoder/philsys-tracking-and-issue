<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PhilTMS – Register (Verification)</title>
  <link rel="stylesheet" href="../Css/Register.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="../index.html" class="navbar-brand">
      <div class="navbar-logo">PS</div>
      <div class="navbar-title">
        <span>PhilTMS</span>
        <span>PhilSys Identification Tracking and Appointment System</span>
      </div>
    </a>
    <div class="navbar-actions">
    
      </a>
      <a href="Register-step1.html" class="btn-register-nav">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        Register
      </a>
    </div>
  </nav>

  <!-- PAGE -->
  <div class="page-wrapper">
    <div class="registration-card">

      <!-- STEPPER -->
      <div class="stepper">
        <div class="step-item">
          <div class="step-circle completed"></div>
        </div>
        <div class="step-line completed"></div>
        <div class="step-item">
          <div class="step-circle completed"></div>
        </div>
        <div class="step-line completed"></div>
        <div class="step-item">
          <div class="step-circle completed"></div>
        </div>
        <div class="step-line completed"></div>
        <div class="step-item">
          <div class="step-circle active">4</div>
        </div>
      </div>

      <!-- OTP Section -->
      <div class="otp-container">
        <h2 class="otp-title">Verify Your Identity</h2>
        <p class="otp-description">
          We sent a 6-digit code to + ••••••• + &lt;email&gt;.com.<br/>
          Enter it below to verify your account.
        </p>

        <div class="otp-inputs" id="otpInputs">
          <input class="otp-input" maxlength="1" type="text" inputmode="numeric" id="otp0" value="7" />
          <input class="otp-input" maxlength="1" type="text" inputmode="numeric" id="otp1" value="5" />
          <input class="otp-input" maxlength="1" type="text" inputmode="numeric" id="otp2" value="0" />
          <input class="otp-input" maxlength="1" type="text" inputmode="numeric" id="otp3" />
          <input class="otp-input" maxlength="1" type="text" inputmode="numeric" id="otp4" />
          <input class="otp-input" maxlength="1" type="text" inputmode="numeric" id="otp5" />
        </div>

        <p style="text-align:center;font-size:13px;font-weight:500;color:#374151;margin-bottom:18px;">
          Step – 4 Confirmation
        </p>

        <a href="Register-confirmation.html" class="btn-confirm" id="btnVerify">Verify &amp; Continue</a>

        <p class="otp-resend">
          Didn't receive a code? <a href="#" id="resendBtn">Resend OTP</a>
        </p>
      </div>

    </div>
  </div>

  <script src="../js/Register.js"></script>
  <script>
    // Auto-tab OTP inputs
    const otpInputs = document.querySelectorAll('.otp-input');
    otpInputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        // Only allow digits
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
        if (e.target.value && index < otpInputs.length - 1) {
          otpInputs[index + 1].focus();
        }
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          otpInputs[index - 1].focus();
        }
      });
    });

    // Resend OTP
    document.getElementById('resendBtn').addEventListener('click', (e) => {
      e.preventDefault();
      otpInputs.forEach(i => i.value = '');
      otpInputs[0].focus();
      alert('A new OTP has been sent to your email/mobile.');
    });
  </script>
</body>
</html>
