<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhilTMS — Login</title>
  <link rel="stylesheet" href="../../shared/css/global.css" />
  <link rel="stylesheet" href="../../shared/css/components.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-brand">
      <img src="../../assets/images/logo-header.png" class="brand-logo"
           alt="PhilTMS Logo" style="width: 120px !important; height: 120px !important; object-fit: contain;" />
      <div>
        <div class="brand-name">PhilTMS</div>
        <div class="brand-tagline">PhilSys Identification Tracking and Appointment System</div>
      </div>
    </div>
    <div class="navbar-actions">
      <a href="../../index.html" class="btn-ghost btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg> Home Page
      </a>
    
      <span class="navbar-separator">|</span>
      <a href="registration/step1.html" class="btn-ghost btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg> Register
      </a>
    </div>
  </nav>

  <!-- PAGE -->
  <div class="page-wrapper centered">
    <div class="card login-card">

      <div class="login-header">
        <h2 class="login-title">Welcome!</h2>
        <p class="login-subtitle">Sign in to access your PhilSys account and National ID related services</p>
      </div>

      <form id="login-form" novalidate>

        <div class="form-group">
          <label class="form-label">PhilSys Number or Email <span class="required">*</span></label>
          <input type="text" class="form-input" id="identifier"
                 placeholder="e.g. Valdezvirginia@gmail.com" required />
          <span class="form-error-text" id="identifier-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-password-wrapper">
            <input type="password" class="form-input" id="password"
                   placeholder="••••••••" required />
            <button type="button" class="password-toggle" id="toggle-password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form-error-text" id="password-error"></span>
        </div>

        <div class="form-row-inline">
          <div class="form-checkbox-group" style="margin-bottom:0">
            <input type="checkbox" id="remember" />
            <label for="remember">Keep me signed in on this device</label>
          </div>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary login-btn">Sign In</button>

        <div class="or-divider">or</div>

        <button type="button" class="btn-psa">Sign in with PSA PhilSys Number</button>

        <p class="login-register">
          Don't have a account? <a href="../pages/registration/step1.html">Create new Account</a>
        </p>

      </form>
    </div>
  </div>

  <script src="../../shared/js/auth.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
