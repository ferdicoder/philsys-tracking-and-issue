<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhilTMS — Register: Step 2</title>
  <link rel="stylesheet" href="../../../shared/css/global.css" />
  <link rel="stylesheet" href="../../../shared/css/components.css" />
  <link rel="stylesheet" href="../../css/registration/step2.css" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <img src="../../../assets/images/logo-header.png" 
      class="brand-logo" 
      alt="PhilTMS Logo"
      style="width: 120px !important; height: 120px !important; object-fit: contain;" />
      <div>
        <div class="brand-name">PhilTMS</div>
        <div class="brand-tagline">PhilSys Status Tracking and Issue Management System</div>
      </div>
    </div>
    <div class="navbar-actions">
      <a href="../pages/home.html" class="btn-ghost btn">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9,22 9,12 15,12 15,22"/>
  </svg> Home
      <a href="../pages/login.html" class="btn btn-secondary">LogIn</a>
    </div>
  </nav>

  <div class="page-wrapper centered">
    <div class="card">

      <!-- STEPPER -->
      <div class="stepper">
        <div class="stepper-step done">
          <div class="stepper-circle"></div>
        </div>
        <div class="stepper-line done"></div>
        <div class="stepper-step active">
          <div class="stepper-circle"><span class="stepper-number">2</span></div>
        </div>
        <div class="stepper-line"></div>
        <div class="stepper-step inactive">
          <div class="stepper-circle"><span class="stepper-number">3</span></div>
        </div>
        <div class="stepper-line"></div>
        <div class="stepper-step inactive">
          <div class="stepper-circle"><span class="stepper-number">4</span></div>
        </div>
      </div>

      <!-- ALERT -->
      <div class="alert alert-error">
        <svg class="alert-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        Please ensure all information matches your PSA birth certificate or valid government ID.
      </div>

      <div class="step-title">Step 2 – Government ID Verification</div>
      <div class="step-subtitle">Upload a valid government-issued ID for identity verification.</div>

      <form id="step2-form" novalidate>

        <div class="form-group">
          <label class="form-label">ID Type<span class="required">*</span></label>
          <div class="form-select-wrapper">
            <select class="form-select" id="id-type" required>
              <option value="" disabled selected>Select</option>
              <option value="philsys">PhilSys National ID</option>
              <option value="passport">Passport</option>
              <option value="drivers">Driver's License</option>
              <option value="sss">SSS ID</option>
              <option value="gsis">GSIS ID</option>
              <option value="voters">Voter's ID</option>
              <option value="prc">PRC ID</option>
              <option value="postal">Postal ID</option>
              <option value="senior">Senior Citizen ID</option>
              <option value="pwd">PWD ID</option>
            </select>
          </div>
          <span class="form-error-text" id="id-type-error"></span>
        </div>

        <!-- UPLOAD AREA -->
        <div class="upload-area" id="upload-area">
          <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
          <div class="upload-label">Drag and Drop here</div>
          <div class="upload-or">or</div>
          <label for="file-input" class="upload-btn">Select file</label>
          <input type="file" id="file-input" class="upload-input" accept="image/*,.pdf" />
          <div class="upload-preview" id="upload-preview"></div>
        </div>
        <span class="form-error-text" id="file-error"></span>

        <div style="height:var(--space-5)"></div>
        <button type="submit" class="btn btn-primary">Next</button>

      </form>
    </div>
  </div>

  <script src="../../js/registration/step2.js"></script>
</body>
</html>
