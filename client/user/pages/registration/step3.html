<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhilTMS — Register: Verify Identity</title>
  <link rel="stylesheet" href="../../../shared/css/global.css" />
  <link rel="stylesheet" href="../../../shared/css/components.css" />
  <link rel="stylesheet" href="../../css/registration/step3.css" />

  <script src="../../../shared/js/register-api.js" defer></script>
  <script src="../../js/registration/step3.js" defer></script>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <img src="../../../assets/main-logo-header.png" 
      class="brand-logo" 
      alt="PhilTMS Logo"
      style="width: 64px !important; height: 64px !important; object-fit: contain;" />
      <div>
        <div class="brand-name">PhilTMS</div>
        <div class="brand-tagline">PhilSys Status Tracking and Issue Management System</div>
      </div>
    </div>
    <div class="navbar-actions">
      <a href="../home.html" class="btn-ghost btn">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9,22 9,12 15,12 15,22"/>
  </svg> Home
      <a href="../login.html" class="btn btn-secondary">LogIn</a>
    </div>
  </nav>

  <div class="page-wrapper centered">
    <div class="card">

      <!-- STEPPER -->
      <div class="stepper">
        <div class="stepper-step done"><div class="stepper-circle"></div></div>
        <div class="stepper-line done"></div>
        <div class="stepper-step done"><div class="stepper-circle"></div></div>
        <div class="stepper-line done"></div>
        <div class="stepper-step active"><div class="stepper-circle"><span class="stepper-number">3</span></div></div>
      </div>

      <!-- VERIFY IDENTITY CONTENT -->
      <div class="verify-header">
        <h2 class="verify-title">Verify Your Identity</h2>
        <p class="verify-desc">
          We sent a 6-digit code to <strong id="masked-email">a••••••••@gmail.com</strong><br/>
          
        </p>
      </div>

      <!-- OTP -->
      <div class="otp-label">Email OTP</div>
      <div class="otp-container">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
      </div>
      <span class="form-error-text text-center" id="otp-error" style="display:block;text-align:center;margin-bottom:var(--space-3)"></span>

      <div class="resend-row">
        Didn't receive a code?
        <button type="button" class="resend-btn" id="resend-btn">Resend</button>
        <span class="resend-timer" id="resend-timer">in <span id="countdown">60</span>s</span>
      </div>

      <div style="height:var(--space-5)"></div>
      <button type="button" class="btn btn-primary" id="verify-btn">Confirm</button>

    </div>
  </div>
  
  
</body>
</html>
