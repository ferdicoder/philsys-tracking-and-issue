<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhilTMS — Register: Verify Identity</title>
  <link rel="stylesheet" href="../../../shared/css/global.css" />
  <link rel="stylesheet" href="../../css/registration/step3.css" />
  <script src="../../../shared/js/register-api.js" defer></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-brand">
      <img src="../../../assets/main-logo-header.png"
           class="brand-logo"
           alt="PhilTMS Logo"
           style="width:64px !important;height:64px !important;object-fit:contain;" />
      <div>
        <div class="brand-name">PhilTMS</div>
        <div class="brand-tagline">PhilSys Status Tracking and Issue Management System</div>
      </div>
    </div>
    <div class="navbar-actions">
      <a href="../../../index.html" class="btn-ghost btn" style="display:flex;align-items:center;gap:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg> Home Page
      </a>
      <a href="../../pages/login.html" class="btn btn-secondary">LogIn</a>
    </div>
  </nav>

  <!-- PAGE -->
  <div class="page-wrapper centered">
    <div class="card">

      <!-- STEPPER: steps 1 & 2 done, step 3 active -->
      <div class="stepper">
        <div class="stepper-step done">
          <div class="stepper-circle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="#fff" stroke-width="3"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
        </div>
        <div class="stepper-line done"></div>
        <div class="stepper-step done">
          <div class="stepper-circle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="#fff" stroke-width="3"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
        </div>
        <div class="stepper-line done"></div>
        <div class="stepper-step active">
          <div class="stepper-circle">
            <span class="stepper-number">3</span>
          </div>
        </div>
      </div>

      <!-- HEADER -->
      <div class="verify-header">
        <div class="verify-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <h2 class="verify-title">Verify Your Identity</h2>
        <p class="verify-desc">
          We sent a 6-digit verification code to<br/>
          <strong id="masked-email">a••••••••@example.com</strong>
        </p>
      </div>

      <!-- OTP -->
      <div class="otp-label">Enter 6-digit code</div>
      <div class="otp-container">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
      </div>

      <span class="form-error-text" id="otp-error"></span>

      <!-- Resend row -->
      <div class="resend-row">
        Didn't receive a code?
        <button type="button" class="resend-btn" id="resend-btn" disabled>Resend</button>
        <span class="resend-timer" id="resend-timer">
          in <span id="countdown">60</span>s
        </span>
      </div>

      <div style="height:var(--space-5)"></div>

      <button type="button" class="btn btn-primary" id="verify-btn">Confirm</button>

    </div>
  </div>

  <script src="../../js/registration/step3.js"></script>
</body>
</html>
