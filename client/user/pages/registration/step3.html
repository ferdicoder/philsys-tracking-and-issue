<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhilTMS — Register: Step 3</title>
  <link rel="stylesheet" href="../../../shared/css/global.css" />
  <link rel="stylesheet" href="../../../shared/css/components.css" />
  <link rel="stylesheet" href="../../css/registration/step3.css" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <img src="../../../assets/images/logo-header.png" 
      class="brand-logo" 
      alt="PhilTMS Logo"
      style="width: 120px !important; height: 120px !important; object-fit: contain;" />
      <div>
        <div class="brand-name">PhilTMS</div>
        <div class="brand-tagline">PhilSys Status Tracking and Issue Management System</div>
      </div>
    </div>
    <div class="navbar-actions">
      <a href="../pages/home.html" class="btn-ghost btn">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9,22 9,12 15,12 15,22"/>
  </svg> Home
      <a href="../pages/login.html" class="btn btn-secondary">LogIn</a>
    </div>
  </nav>

  <div class="page-wrapper centered">
    <div class="card">

      <!-- STEPPER -->
      <div class="stepper">
        <div class="stepper-step done"><div class="stepper-circle"></div></div>
        <div class="stepper-line done"></div>
        <div class="stepper-step done"><div class="stepper-circle"></div></div>
        <div class="stepper-line done"></div>
        <div class="stepper-step active"><div class="stepper-circle"><span class="stepper-number">3</span></div></div>
        <div class="stepper-line"></div>
        <div class="stepper-step inactive"><div class="stepper-circle"><span class="stepper-number">4</span></div></div>
      </div>

      <!-- ALERT -->
      <div class="alert alert-error">
        <svg class="alert-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        Please ensure all information matches your PSA birth certificate or valid government ID.
      </div>

      <div class="step-title">Step 3 – Account Setup</div>
      <div class="step-subtitle">Create your login credentials for PhilSys online services.</div>

      <form id="step3-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="email">EMAIL ADDRESS<span class="required">*</span></label>
          <input type="email" class="form-input" id="email" placeholder="Enter your email" required />
          <span class="form-error-text" id="email-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="mobile">Mobile Number</label>
          <input type="tel" class="form-input" id="mobile" placeholder="Mobile Number" />
        </div>

        <!-- CREATE PASSWORD divider -->
        <div class="form-divider">Create Password</div>

        <div class="form-group">
          <label class="form-label" for="new-password">New Password<span class="required">*</span></label>
          <div class="input-password-wrapper">
            <input type="password" class="form-input" id="new-password" placeholder="Enter" required />
            <button type="button" class="password-toggle" id="toggle-new">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye-new"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="form-error-text" id="password-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password<span class="required">*</span></label>
          <div class="input-password-wrapper">
            <input type="password" class="form-input" id="confirm-password" placeholder="Enter" required />
            <button type="button" class="password-toggle" id="toggle-confirm">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye-confirm"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="form-error-text" id="confirm-error"></span>
        </div>

        <!-- TERMS -->
        <div class="form-checkbox-group">
          <input type="checkbox" id="terms" required />
          <label for="terms">
            I agree to PhilSys <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>, and consent to the collection of my personal data under the Data Privacy Act of 2012.
          </label>
        </div>
        <span class="form-error-text" id="terms-error"></span>

        <div class="form-checkbox-group">
          <input type="checkbox" id="notifications" />
          <label for="notifications">
            I would like to receive appointment reminders and updates via email and SMS.
          </label>
        </div>

        <div style="height:var(--space-4)"></div>
        <button type="submit" class="btn btn-primary">Continue to Verification</button>

      </form>
    </div>
  </div>

  <script src="../../js/registration/step3.js"></script>
</body>
</html>
